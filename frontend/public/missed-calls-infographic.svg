  <text x="104" y="505" font-family="Arial, sans-serif" font-size="14" fill="#f97316" text-anchor="middle">✓</text>
  <circle cx="104" cy="537" r="16" fill="rgba(249,115,22,0.2)"/>
  <text x="104" y="543" font-family="Arial, sans-serif" font-size="14" fill="#f97316" text-anchor="middle">✓</text>

